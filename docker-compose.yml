services:
  mysql:
    image: mysql:8.0
    container_name: fittrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-fittrack}
      MYSQL_USER: ${DB_USER:-fittrack_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fittrack_pass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fittrack-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fittrack-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - fittrack-network
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fittrack-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fittrack-network

  nginx:
    image: nginx:alpine
    container_name: fittrack-nginx
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - fittrack-network
    depends_on:
      - backend
      - frontend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: fittrack-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-fittrack_user}
      PMA_PASSWORD: ${DB_PASSWORD:-fittrack_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    ports:
      - "8081:80"
    networks:
      - fittrack-network
    depends_on:
      mysql:
        condition: service_healthy

networks:
  fittrack-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local